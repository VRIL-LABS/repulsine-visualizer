<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repulsine Implosion Dynamics | Advanced Telemetry</title>
  
  <style>
    :root {
      --font-body: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --accent: #0f766e; 
      --accent-glow: rgba(15, 118, 110, 0.15);
      
      /* Dark Mode (Secret Bunker Vibe) */
      --bg-color: #0a0a0a;
      --surface-color: rgba(23, 23, 23, 0.85);
      --text-main: #f5f5f5;
      --text-muted: #a3a3a3;
      --border-color: rgba(64, 64, 64, 0.8);
      --backdrop-blur: blur(12px);
    }

    [data-theme="light"] {
      --bg-color: #fafafa;
      --surface-color: rgba(255, 255, 255, 0.85);
      --text-main: #171717;
      --text-muted: #525252;
      --border-color: rgba(229, 229, 229, 0.8);
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* Device Warning Modal */
    #compatibility-warning {
      display: none;
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--bg-color);
      z-index: 9999;
      justify-content: center; align-items: center; text-align: center;
      padding: 24px; box-sizing: border-box;
    }

    #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    
    #svg-layer {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 2; pointer-events: none;
    }

    #ui-layer {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 10; pointer-events: none; padding: 24px; box-sizing: border-box;
    }

    .telemetry-panel {
      position: absolute;
      background: var(--surface-color);
      backdrop-filter: var(--backdrop-blur);
      border: 1px solid var(--border-color);
      padding: 16px; border-radius: 8px;
      pointer-events: auto; width: 280px;
      display: none; /* Shown via JS */
      transition: opacity 0.3s ease;
    }

    h2 { margin: 0 0 8px 0; font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    p { margin: 0; font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    
    .kpi { margin-top: 12px; display: flex; flex-direction: column; }
    .kpi-val { font-size: 24px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums lining-nums; }
    .kpi-lbl { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; }

    .theme-toggle {
      position: absolute; top: 24px; right: 24px;
      background: var(--surface-color); border: 1px solid var(--border-color);
      color: var(--text-main); padding: 8px 16px; border-radius: 4px;
      cursor: pointer; pointer-events: auto; font-family: var(--font-body); font-size: 12px;
      z-index: 20;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

  <div id="compatibility-warning">
    <div class="telemetry-panel" style="display: block; position: static; pointer-events: auto;">
      <h2 style="color: #ef4444;">System Unsupported</h2>
      <p>Your device or browser lacks WebGL 2.0 or hardware acceleration required for this hyper-detailed physics simulation.</p>
    </div>
  </div>

  <div id="webgl-container"></div>
  
  <svg id="svg-layer">
    <line id="svg-connector" x1="0" y1="0" x2="0" y2="0" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4" opacity="0"></line>
  </svg>

  <div id="ui-layer">
    <button class="theme-toggle" id="theme-toggle">Theme: Dark</button>
    
    <div class="telemetry-panel" id="info-panel" style="top: 20%; left: 60px;">
      <h2 id="panel-title">Component</h2>
      <p id="panel-desc">Description</p>
      <div class="kpi">
        <span class="kpi-val" id="panel-kpi-val">0.00</span>
        <span class="kpi-lbl" id="panel-kpi-lbl">Metric</span>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // 0. BROWSER/DEVICE DETECTION
    // ==========================================
    function checkSupport() {
      try {
        const canvas = document.createElement('canvas');
        return !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
      } catch (e) { return false; }
    }
    if (!checkSupport()) {
      document.getElementById('compatibility-warning').style.display = 'flex';
      throw new Error("WebGL not supported.");
    }

    // ==========================================
    // 1. SCENE SETUP & POST-PROCESSING (Restored from v2)
    // ==========================================
    const container = document.getElementById('webgl-container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0a0a, 0.015);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 45);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 - 0.1; // Keep above floor

    // Post-Processing (Bloom)
    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.2;
    bloomPass.strength = 1.2;
    bloomPass.radius = 0.5;

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // ==========================================
    // 2. ENVIRONMENT: THE SECRET BUNKER & WATER (New)
    // ==========================================
    const roomMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.6, metalness: 0.8, side: THREE.BackSide });
    const room = new THREE.Mesh(new THREE.BoxGeometry(150, 80, 150), roomMat);
    room.position.y = 30;
    scene.add(room);

    // Dynamic Water Floor
    const waterGeo = new THREE.PlaneGeometry(40, 40, 128, 128);
    const waterMat = new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 0.9, roughness: 0.1, transparent: true, opacity: 0.8 });
    const waterPanel = new THREE.Mesh(waterGeo, waterMat);
    waterPanel.rotation.x = -Math.PI / 2;
    waterPanel.position.y = -5;
    waterPanel.receiveShadow = true;
    scene.add(waterPanel);

    // Store base vertices for water animation
    const waterBase = [];
    const posAttr = waterGeo.attributes.position;
    for (let i = 0; i < posAttr.count; i++) {
      waterBase.push({ x: posAttr.getX(i), y: posAttr.getY(i) });
    }

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const spotLight = new THREE.SpotLight(0xffffff, 1.5, 100, Math.PI/4, 0.5, 1);
    spotLight.position.set(0, 30, 0);
    spotLight.castShadow = true;
    scene.add(spotLight);

    // ==========================================
    // 3. CRAFT GEOMETRY (Restored Lathe & InstancedMesh from v2)
    // ==========================================
    const craftGroup = new THREE.Group();
    craftGroup.position.y = 5;
    scene.add(craftGroup);

    // Materials
    const hullMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7, roughness: 0.3 });
    const highlightMat = new THREE.MeshStandardMaterial({ color: 0x0f766e, metalness: 0.8, roughness: 0.2, emissive: 0x0f766e, emissiveIntensity: 0.6 });
    
    // Core (Emissive)
    const coreMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1.0 });
    const core = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), coreMat);
    core.userData = { name: "Vortex Core", desc: "Center of diamagnetic implosion.", val: "1.0 atm", lbl: "Pressure" };
    craftGroup.add(core);

    // Aerodynamic Shell (LatheGeometry restored)
    const points = [];
    for ( let i = 0; i <= 10; i ++ ) {
        points.push( new THREE.Vector2( Math.sin( i * 0.2 ) * 8, ( Math.cos( i * 0.3 ) * 2 ) ) );
    }
    const shellGeo = new THREE.LatheGeometry(points, 64);
    const shell = new THREE.Mesh(shellGeo, hullMat);
    shell.castShadow = true;
    shell.userData = { name: "Aerodynamic Shell", desc: "Provides lift and structural integrity.", val: "12,000", lbl: "RPM" };
    craftGroup.add(shell);

    // Whorl Pipes (InstancedMesh restored for performance)
    const pipeCount = 12;
    const pipeGeo = new THREE.TorusGeometry(1.2, 0.2, 16, 32);
    const pipeMat = new THREE.MeshStandardMaterial({ color: 0xb87333, metalness: 0.9, roughness: 0.4 });
    const pipes = new THREE.InstancedMesh(pipeGeo, pipeMat, pipeCount);
    
    const dummy = new THREE.Object3D();
    for (let i = 0; i < pipeCount; i++) {
      const angle = (i / pipeCount) * Math.PI * 2;
      dummy.position.set(Math.cos(angle) * 4, 1.5, Math.sin(angle) * 4);
      dummy.rotation.x = Math.PI / 2;
      dummy.rotation.y = angle; // Tangential
      dummy.updateMatrix();
      pipes.setMatrixAt(i, dummy.matrix);
    }
    // We wrap InstancedMesh in a distinct mesh for raycasting UI since InstancedMesh raycasting returns instanceId
    const pipeHitbox = new THREE.Mesh(new THREE.TorusGeometry(4, 1.5, 16, 32), new THREE.MeshBasicMaterial({visible: false}));
    pipeHitbox.position.y = 1.5;
    pipeHitbox.userData = { name: "Whorl Pipes", desc: "Copper coils inducing the Coanda effect.", val: "4.2 °C", lbl: "Cooling Delta" };
    craftGroup.add(pipes);
    craftGroup.add(pipeHitbox);

    // ==========================================
    // 4. PHYSICS PARTICLES (Enhanced Vortex)
    // ==========================================
    const pCount = 3000;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(pCount * 3);
    const pRadii = new Float32Array(pCount);
    const pAngles = new Float32Array(pCount);

    for (let i = 0; i < pCount; i++) {
      pAngles[i] = Math.random() * Math.PI * 2;
      pRadii[i] = Math.random() * 8;
      pPos[i*3] = Math.cos(pAngles[i]) * pRadii[i];
      pPos[i*3+1] = (Math.random() * 15) - 5; // Y
      pPos[i*3+2] = Math.sin(pAngles[i]) * pRadii[i];
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.1, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
    const vortexParticles = new THREE.Points(pGeo, pMat);
    scene.add(vortexParticles);

    // ==========================================
    // 5. INTERACTION & SVG UI (Restored from v2)
    // ==========================================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredObj = null;
    let originalMat = null;
    
    const panel = document.getElementById('info-panel');
    const svgConnector = document.getElementById('svg-connector');
    const interactables = [core, shell, pipeHitbox];

    // Map 3D coordinate to 2D Screen
    function toScreenPosition(obj, camera) {
      const vector = new THREE.Vector3();
      obj.getWorldPosition(vector);
      vector.project(camera);
      return {
        x: (vector.x * .5 + .5) * window.innerWidth,
        y: (vector.y * -.5 + .5) * window.innerHeight
      };
    }

    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(interactables);

      if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (hoveredObj !== obj) {
          if (hoveredObj && hoveredObj !== pipeHitbox) hoveredObj.material = originalMat;
          
          hoveredObj = obj;
          if (obj !== pipeHitbox) {
             originalMat = obj.material;
             obj.material = highlightMat;
          }

          // Update UI Panel
          document.getElementById('panel-title').innerText = obj.userData.name;
          document.getElementById('panel-desc').innerText = obj.userData.desc;
          document.getElementById('panel-kpi-val').innerText = obj.userData.val;
          document.getElementById('panel-kpi-lbl').innerText = obj.userData.lbl;
          
          panel.style.display = 'block';
          panel.style.opacity = '1';
          svgConnector.setAttribute('opacity', '1');
        }
      } else {
        if (hoveredObj) {
          if (hoveredObj !== pipeHitbox) hoveredObj.material = originalMat;
          hoveredObj = null;
          panel.style.opacity = '0';
          svgConnector.setAttribute('opacity', '0');
          setTimeout(() => { if(!hoveredObj) panel.style.display = 'none'; }, 300);
        }
      }
    });

    // ==========================================
    // 6. ANIMATION LOOP
    // ==========================================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const time = clock.getElapsedTime();
      controls.update();

      // Rotation
      shell.rotation.y -= 2 * delta;
      pipes.rotation.y -= 2 * delta;
      core.rotation.y += 5 * delta;
      
      // Animate Particles (Implosion down to water)
      const positions = vortexParticles.geometry.attributes.position.array;
      for (let i = 0; i < pCount; i++) {
        positions[i*3+1] -= 8 * delta; // move down
        pAngles[i] += 3 * delta; // spin
        
        if (pRadii[i] > 0.2) pRadii[i] -= 3 * delta; // pull in
        
        // Reset at water level
        if (positions[i*3+1] < -5) {
          positions[i*3+1] = 10;
          pRadii[i] = Math.random() * 8 + 2;
        }

        positions[i*3] = Math.cos(pAngles[i]) * pRadii[i];
        positions[i*3+2] = Math.sin(pAngles[i]) * pRadii[i];
      }
      vortexParticles.geometry.attributes.position.needsUpdate = true;

      // Animate Water ripples (Downdraft pressure)
      for (let i = 0; i < posAttr.count; i++) {
        const x = waterBase[i].x;
        const y = waterBase[i].y;
        const dist = Math.sqrt(x*x + y*y);
        // Intense ripples near center
        const z = Math.sin(dist * 3 - time * 8) * 0.3 * Math.max(0, (15 - dist)/15);
        posAttr.setZ(i, z);
      }
      posAttr.needsUpdate = true;
      waterGeo.computeVertexNormals();

      // Update SVG line if hovering
      if (hoveredObj) {
        const screenPos = toScreenPosition(hoveredObj, camera);
        const panelRect = panel.getBoundingClientRect();
        
        svgConnector.setAttribute('x1', screenPos.x);
        svgConnector.setAttribute('y1', screenPos.y);
        svgConnector.setAttribute('x2', panelRect.left);
        svgConnector.setAttribute('y2', panelRect.top + 20);
      }

      // Use Composer for Bloom instead of standard renderer
      composer.render();
    }

    // ==========================================
    // 7. RESIZE & THEMES
    // ==========================================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    const themes = ['dark', 'light', 'auto'];
    let tIndex = 0;
    const tBtn = document.getElementById('theme-toggle');
    tBtn.addEventListener('click', () => {
      tIndex = (tIndex + 1) % themes.length;
      document.documentElement.setAttribute('data-theme', themes[tIndex]);
      tBtn.innerText = `Theme: ${themes[tIndex].charAt(0).toUpperCase() + themes[tIndex].slice(1)}`;
      scene.fog.color.setHex(themes[tIndex] === 'light' ? 0xfafafa : 0x0a0a0a);
    });

    animate();
  </script>
</body>
</html>
