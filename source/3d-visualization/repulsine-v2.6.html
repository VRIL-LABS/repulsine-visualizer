<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schauberger Repulsine | Telemetry & Implosion Dynamics</title>
  
  <style>
    /* =========================================
       DESIGN FOUNDATIONS & TYPOGRAPHY
       ========================================= */
    :root {
      --font-body: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --accent: #0f766e; 
      --accent-glow: rgba(15, 118, 110, 0.2);
      
      /* Dark Mode Default (Secret Bunker Vibe) */
      --bg-color: #0a0a0a;
      --surface-color: rgba(23, 23, 23, 0.85);
      --text-main: #f5f5f5;
      --text-muted: #a3a3a3;
      --border-color: rgba(64, 64, 64, 0.8);
      --backdrop-blur: blur(12px);
    }

    [data-theme="light"] {
      --bg-color: #fafafa;
      --surface-color: rgba(255, 255, 255, 0.85);
      --text-main: #171717;
      --text-muted: #525252;
      --border-color: rgba(229, 229, 229, 0.8);
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    /* Device Warning Modal */
    #compatibility-warning {
      display: none;
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--bg-color);
      z-index: 9999;
      justify-content: center; align-items: center; text-align: center;
      padding: 24px; box-sizing: border-box;
    }

    /* Rendering Layers */
    #webgl-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
    
    #svg-layer {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 2; pointer-events: none;
    }

    #ui-layer {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 10; pointer-events: none; padding: 24px; box-sizing: border-box;
    }

    /* Telemetry Panel UI */
    .telemetry-panel {
      position: absolute;
      background: var(--surface-color);
      backdrop-filter: var(--backdrop-blur);
      border: 1px solid var(--border-color);
      padding: 16px 20px; border-radius: 8px;
      pointer-events: auto; width: 300px;
      display: none; opacity: 0;
      transition: opacity 0.3s ease;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }

    h2 { margin: 0 0 8px 0; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    p { margin: 0; font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    
    .kpi-container { display: flex; gap: 24px; margin-top: 16px; }
    .kpi { display: flex; flex-direction: column; }
    .kpi-val { font-size: 24px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums lining-nums; }
    .kpi-lbl { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px; margin-top: 4px; }

    .theme-toggle {
      position: absolute; top: 24px; right: 24px;
      background: var(--surface-color); border: 1px solid var(--border-color);
      color: var(--text-main); padding: 8px 16px; border-radius: 4px;
      cursor: pointer; pointer-events: auto; font-family: var(--font-body); font-size: 12px;
      z-index: 20; transition: background 0.2s;
    }
    .theme-toggle:hover { background: var(--border-color); }
    
    #hover-hint {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface-color); padding: 8px 16px; border-radius: 20px;
      font-size: 12px; color: var(--text-muted); border: 1px solid var(--border-color);
      pointer-events: auto;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
</head>
<body>

  <div id="compatibility-warning">
    <div class="telemetry-panel" style="display: block; opacity: 1; position: static; pointer-events: auto;">
      <h2 style="color: #ef4444;">Hardware Unsupported</h2>
      <p>Your browser or hardware lacks WebGL acceleration required for the cycloidal physics simulation. Please try a modern desktop browser.</p>
    </div>
  </div>

  <div id="webgl-container"></div>
  
  <svg id="svg-layer">
    <line id="svg-connector" x1="0" y1="0" x2="0" y2="0" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0"></line>
  </svg>

  <div id="ui-layer">
    <button class="theme-toggle" id="theme-toggle">Theme: Dark</button>
    
    <div class="telemetry-panel" id="info-panel" style="top: 20%; left: 80px;">
      <h2 id="panel-title">Component</h2>
      <p id="panel-desc">Description</p>
      <div class="kpi-container">
        <div class="kpi">
          <span class="kpi-val" id="panel-val-1">0.0</span>
          <span class="kpi-lbl" id="panel-lbl-1">Metric 1</span>
        </div>
        <div class="kpi">
          <span class="kpi-val" id="panel-val-2">0.0</span>
          <span class="kpi-lbl" id="panel-lbl-2">Metric 2</span>
        </div>
      </div>
    </div>
    
    <div id="hover-hint">Hover over craft components to analyze telemetry</div>
  </div>

  <script>
    // ==========================================
    // 0. BROWSER/DEVICE DETECTION
    // ==========================================
    function checkSupport() {
      try {
        const canvas = document.createElement('canvas');
        return !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
      } catch (e) { return false; }
    }
    if (!checkSupport()) {
      document.getElementById('compatibility-warning').style.display = 'flex';
      throw new Error("WebGL not supported.");
    }

    // ==========================================
    // 1. SCENE SETUP & POST-PROCESSING
    // ==========================================
    const container = document.getElementById('webgl-container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a0a0a, 0.015);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 35);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.maxPolarAngle = Math.PI / 2 - 0.05; 

    // Bloom Post-Processing for ionized air
    const renderScene = new THREE.RenderPass(scene, camera);
    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.8, 0.5, 0.85);
    bloomPass.threshold = 0.15;
    bloomPass.strength = 1.0;
    bloomPass.radius = 0.8;

    const composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // ==========================================
    // 2. ENVIRONMENT: THE METAL BUNKER & WATER
    // ==========================================
    // Bunker Walls
    const roomMat = new THREE.MeshStandardMaterial({ color: 0x1f2326, roughness: 0.5, metalness: 0.9, side: THREE.BackSide });
    const room = new THREE.Mesh(new THREE.BoxGeometry(150, 80, 150), roomMat);
    room.position.y = 30;
    scene.add(room);

    // Technical Floor Grid
    const gridHelper = new THREE.GridHelper(150, 50, 0x0f766e, 0x333333);
    gridHelper.position.y = -4.9;
    gridHelper.material.opacity = 0.3;
    gridHelper.material.transparent = true;
    scene.add(gridHelper);

    // Reactive Water Testing Pool
    const waterGeo = new THREE.PlaneGeometry(30, 30, 128, 128);
    const waterMat = new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 1.0, roughness: 0.05, transparent: true, opacity: 0.85 });
    const waterPanel = new THREE.Mesh(waterGeo, waterMat);
    waterPanel.rotation.x = -Math.PI / 2;
    waterPanel.position.y = -4.8;
    waterPanel.receiveShadow = true;
    scene.add(waterPanel);

    // Store base vertices for fluid dynamics
    const waterBase = [];
    const posAttr = waterGeo.attributes.position;
    for (let i = 0; i < posAttr.count; i++) {
      waterBase.push({ x: posAttr.getX(i), y: posAttr.getY(i) });
    }

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const spotLight = new THREE.SpotLight(0xffffff, 2.0, 100, Math.PI/4, 0.5, 1);
    spotLight.position.set(0, 35, 0);
    spotLight.castShadow = true;
    scene.add(spotLight);

    // ==========================================
    // 3. REPULSINE GEOMETRY (Academically Accurate)
    // ==========================================
    const craftGroup = new THREE.Group();
    craftGroup.position.y = 6;
    scene.add(craftGroup);

    // Shared Materials
    const hullMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6, roughness: 0.3 });
    const copperMat = new THREE.MeshStandardMaterial({ color: 0xb87333, metalness: 0.9, roughness: 0.4 });
    const highlightMat = new THREE.MeshStandardMaterial({ color: 0x0f766e, metalness: 0.8, roughness: 0.2, emissive: 0x0f766e, emissiveIntensity: 0.5 });
    
    // Core Intake (Emissive)
    const coreMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.8 });
    const core = new THREE.Mesh(new THREE.SphereGeometry(1.2, 32, 32), coreMat);
    core.userData = { name: "Suction Chamber Core", desc: "Induces biological vacuum via diamagnetic cooling.", v1: "-2.4 °C", l1: "Core Temp", v2: "0.2 atm", l2: "Pressure" };
    craftGroup.add(core);

    // Aerodynamic Coanda Shell (Lathe)
    const points = [];
    for (let i = 0; i <= 12; i++) points.push(new THREE.Vector2(Math.sin(i * 0.15) * 8, Math.cos(i * 0.2) * 2.5));
    const shell = new THREE.Mesh(new THREE.LatheGeometry(points, 64), hullMat);
    shell.castShadow = true;
    shell.userData = { name: "Coanda Aerodynamic Hull", desc: "Maintains low-pressure gradient for vertical lift.", v1: "12,400", l1: "RPM", v2: "1.4 kg", l2: "Radial Prs." };
    craftGroup.add(shell);

    // Schauberger Corrugated Wavy Plates (Procedural Sine Wave Modification)
    const plateGroup = new THREE.Group();
    const plateGeo = new THREE.CylinderGeometry(5.5, 5.5, 0.05, 128, 1);
    const pVerts = plateGeo.attributes.position;
    for(let i=0; i<pVerts.count; i++) {
        const x = pVerts.getX(i);
        const z = pVerts.getZ(i);
        const angle = Math.atan2(z, x);
        const dist = Math.sqrt(x*x + z*z);
        // Create 18 ripples, increasing in amplitude towards the outer edge
        const wave = Math.sin(angle * 18) * 0.2 * (dist / 5.5); 
        pVerts.setY(i, pVerts.getY(i) + wave);
    }
    plateGeo.computeVertexNormals();
    
    for(let j = 0; j < 3; j++) {
        const p = new THREE.Mesh(plateGeo, copperMat);
        p.position.y = 1.0 + (j * 0.4);
        plateGroup.add(p);
    }
    craftGroup.add(plateGroup);

    // Corrugated Plate Hitbox (for UI raycasting)
    const plateHitbox = new THREE.Mesh(new THREE.CylinderGeometry(6, 6, 1.5, 32), new THREE.MeshBasicMaterial({visible: false}));
    plateHitbox.position.y = 1.4;
    plateHitbox.userData = { name: "Corrugated Turbine Plates", desc: "Stacked wavy plates mimicking trout-turbine fluid dynamics.", v1: "3", l1: "Stages", v2: "Active", l2: "Implosion" };
    craftGroup.add(plateHitbox);

    // Tangential Whorl Pipes (InstancedMesh)
    const pipeCount = 8;
    const pipes = new THREE.InstancedMesh(new THREE.TorusGeometry(1.0, 0.15, 16, 32), copperMat, pipeCount);
    const dummy = new THREE.Object3D();
    for (let i = 0; i < pipeCount; i++) {
      const angle = (i / pipeCount) * Math.PI * 2;
      dummy.position.set(Math.cos(angle) * 3, 2.5, Math.sin(angle) * 3);
      dummy.rotation.x = Math.PI / 2;
      dummy.rotation.y = angle; 
      dummy.updateMatrix();
      pipes.setMatrixAt(i, dummy.matrix);
    }
    craftGroup.add(pipes);

    // ==========================================
    // 4. PHYSICS PARTICLES (Cycloidal Implosion)
    // ==========================================
    const pCount = 4000;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(pCount * 3);
    const pRadii = new Float32Array(pCount);
    const pAngles = new Float32Array(pCount);

    for (let i = 0; i < pCount; i++) {
      pAngles[i] = Math.random() * Math.PI * 2;
      pRadii[i] = Math.random() * 8 + 0.5;
      pPos[i*3]   = Math.cos(pAngles[i]) * pRadii[i];
      pPos[i*3+1] = (Math.random() * 20) - 5; 
      pPos[i*3+2] = Math.sin(pAngles[i]) * pRadii[i];
    }
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({ color: 0x00ffff, size: 0.08, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
    const vortexParticles = new THREE.Points(pGeo, pMat);
    scene.add(vortexParticles);

    // ==========================================
    // 5. INTERACTION & UI MAPPING
    // ==========================================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredObj = null;
    let originalMat = null;
    
    const panel = document.getElementById('info-panel');
    const svgConnector = document.getElementById('svg-connector');
    const interactables = [core, shell, plateHitbox];

    // Coordinate Projection
    function toScreenPosition(obj, camera) {
      const vector = new THREE.Vector3();
      obj.getWorldPosition(vector);
      vector.project(camera);
      return {
        x: (vector.x * .5 + .5) * window.innerWidth,
        y: (vector.y * -.5 + .5) * window.innerHeight
      };
    }

    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(interactables);

      if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (hoveredObj !== obj) {
          
          // Reset previous
          if (hoveredObj) {
              if(hoveredObj === plateHitbox) plateGroup.children.forEach(c => c.material = originalMat);
              else hoveredObj.material = originalMat;
          }
          
          hoveredObj = obj;
          
          // Apply Highlight
          if (obj === plateHitbox) {
             originalMat = plateGroup.children[0].material;
             plateGroup.children.forEach(c => c.material = highlightMat);
          } else {
             originalMat = obj.material;
             obj.material = highlightMat;
          }

          // Populate UI
          document.getElementById('panel-title').innerText = obj.userData.name;
          document.getElementById('panel-desc').innerText = obj.userData.desc;
          document.getElementById('panel-val-1').innerText = obj.userData.v1;
          document.getElementById('panel-lbl-1').innerText = obj.userData.l1;
          document.getElementById('panel-val-2').innerText = obj.userData.v2;
          document.getElementById('panel-lbl-2').innerText = obj.userData.l2;
          
          panel.style.display = 'block';
          setTimeout(() => panel.style.opacity = '1', 10);
          svgConnector.setAttribute('opacity', '1');
        }
      } else {
        if (hoveredObj) {
          if(hoveredObj === plateHitbox) plateGroup.children.forEach(c => c.material = originalMat);
          else hoveredObj.material = originalMat;
          hoveredObj = null;
          
          panel.style.opacity = '0';
          svgConnector.setAttribute('opacity', '0');
          setTimeout(() => { if(!hoveredObj) panel.style.display = 'none'; }, 300);
        }
      }
    });

    // ==========================================
    // 6. ANIMATION LOOP
    // ==========================================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const time = clock.getElapsedTime();
      controls.update();

      // Mechanical Rotation
      shell.rotation.y -= 1.5 * delta;
      plateGroup.rotation.y -= 2.5 * delta; // Rotates opposite to outer shell
      pipes.rotation.y -= 1.5 * delta;
      
      // Animate Particles (Centripetal Implosion)
      const positions = vortexParticles.geometry.attributes.position.array;
      for (let i = 0; i < pCount; i++) {
        
        let r = pRadii[i];
        if (r > 0.2) r -= 2 * delta; // Pull inward
        
        // Angular momentum conservation: spins faster as radius decreases
        let vTheta = 3.0 / (r + 0.5); 
        pAngles[i] += vTheta * delta; 
        
        positions[i*3+1] -= 8 * delta; // Downdraft
        
        // Reset at water level
        if (positions[i*3+1] < -4.8) {
          positions[i*3+1] = 12; // Back to top intake
          r = Math.random() * 8 + 1;
        }

        pRadii[i] = r;
        positions[i*3] = Math.cos(pAngles[i]) * r;
        positions[i*3+2] = Math.sin(pAngles[i]) * r;
      }
      vortexParticles.geometry.attributes.position.needsUpdate = true;

      // Animate Water ripples (Downdraft pressure / Diamagnetic effect)
      for (let i = 0; i < posAttr.count; i++) {
        const x = waterBase[i].x;
        const y = waterBase[i].y;
        const dist = Math.sqrt(x*x + y*y);
        // Concentric waves radiating outward, strongest in the center
        const z = Math.sin(dist * 2.5 - time * 6) * 0.4 * Math.max(0, (15 - dist)/15);
        posAttr.setZ(i, z);
      }
      posAttr.needsUpdate = true;
      waterGeo.computeVertexNormals();

      // Update SVG Line Layout
      if (hoveredObj) {
        const screenPos = toScreenPosition(hoveredObj === plateHitbox ? plateGroup.children[1] : hoveredObj, camera);
        const panelRect = panel.getBoundingClientRect();
        
        svgConnector.setAttribute('x1', screenPos.x);
        svgConnector.setAttribute('y1', screenPos.y);
        svgConnector.setAttribute('x2', panelRect.left - 5);
        svgConnector.setAttribute('y2', panelRect.top + 24);
      }

      composer.render();
    }

    // ==========================================
    // 7. RESIZE & THEME LOGIC
    // ==========================================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    const themes = ['dark', 'light'];
    let tIndex = 0;
    const tBtn = document.getElementById('theme-toggle');
    tBtn.addEventListener('click', () => {
      tIndex = (tIndex + 1) % themes.length;
      document.documentElement.setAttribute('data-theme', themes[tIndex]);
      tBtn.innerText = `Theme: ${themes[tIndex].charAt(0).toUpperCase() + themes[tIndex].slice(1)}`;
      scene.fog.color.setHex(themes[tIndex] === 'light' ? 0xfafafa : 0x0a0a0a);
    });

    // Start
    animate();
  </script>
</body>
</html>
