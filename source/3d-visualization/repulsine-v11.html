<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repulsine Implosion Dynamics | Advanced Telemetry</title>
  
  <style>
    /* =========================================
       DESIGN FOUNDATIONS & TYPOGRAPHY
       ========================================= */
    :root {
      --font-body: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --accent: #0f766e; 
      --accent-glow: rgba(15, 118, 110, 0.15);
      
      /* Dark Mode */
      --bg-color: #0a0a0a;
      --surface-color: rgba(23, 23, 23, 0.85);
      --text-main: #f5f5f5;
      --text-muted: #a3a3a3;
      --border-color: rgba(64, 64, 64, 0.8);
      --backdrop-blur: blur(12px);
    }

    [data-theme="light"] {
      --bg-color: #fafafa;
      --surface-color: rgba(255, 255, 255, 0.85);
      --text-main: #171717;
      --text-muted: #525252;
      --border-color: rgba(229, 229, 229, 0.8);
    }

    body {
      margin: 0; overflow: hidden;
      background-color: var(--bg-color); color: var(--text-main);
      font-family: var(--font-body); -webkit-font-smoothing: antialiased;
    }

    #webgl-container, #svg-layer {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
    }
    #webgl-container { z-index: 1; }
    #svg-layer { z-index: 2; pointer-events: none; }

    /* UI Overlay */
    #ui-layer {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 10; pointer-events: none; padding: 24px; box-sizing: border-box;
      display: flex; flex-direction: column; justify-content: space-between;
    }

    /* Status Badge (Preserved for zero regression) */
    .status-badge {
      background: rgba(15, 118, 110, 0.2); color: var(--accent); border: 1px solid var(--accent);
      padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase;
    }
	
    /* =========================================
       HEADER, BACK BUTTON & TYPOGRAPHY
       ========================================= */
    .header-container {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 100; /* Ensure it stays above the 3D canvas */
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none; /* Let clicks pass through the container... */
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s ease;
      cursor: pointer;
      pointer-events: auto; /* ...but allow clicking the button */
      width: fit-content;
    }

    .back-button:hover {
      color: var(--accent);
    }

    .title-group {
      display: flex;
      flex-direction: column;
      pointer-events: auto;
    }
    
    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .main-title {
      color: var(--text-main);
      font-size: 24px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.5px;
    }

    .subtext {
      color: var(--text-muted);
      font-size: 13px;
      margin: 4px 0 0 0;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .controls {
      position: absolute; top: 24px; right: 24px; display: flex; gap: 8px; pointer-events: auto;
    }
    button {
      background: var(--surface-color); border: 1px solid var(--border-color);
      color: var(--text-main); padding: 8px 16px; border-radius: 4px;
      cursor: pointer; font-family: var(--font-body); font-size: 12px; font-weight: 500;
      backdrop-filter: var(--backdrop-blur); transition: all 0.2s ease;
    }
    button:hover, button.active { background: var(--border-color); }
    button.active { border-color: var(--accent); color: var(--accent); }

    .telemetry-panel {
      position: absolute; background: var(--surface-color); backdrop-filter: var(--backdrop-blur);
      border: 1px solid var(--border-color); padding: 16px 20px; border-radius: 8px;
      pointer-events: auto; width: 280px; display: none; opacity: 0; transition: opacity 0.3s ease;
    }
    .telemetry-panel h2 { margin: 0 0 8px 0; font-size: 14px; font-weight: 700; text-transform: uppercase; }
    .telemetry-panel p { margin: 0; font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .kpi-container { display: flex; gap: 24px; margin-top: 16px; border-top: 1px solid var(--border-color); padding-top: 16px; }
    .kpi { display: flex; flex-direction: column; }
    .kpi-val { font-size: 22px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums lining-nums; }
    .kpi-lbl { font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-top: 4px; }

    #overlay {
      position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column;
      justify-content: center; align-items: center; transition: opacity 0.5s ease;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border-color);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div id="overlay">
    <div class="spinner"></div>
    <p style="margin-top: 16px; font-size: 14px; letter-spacing: 1px;">INITIALIZING REPULSINE PHYSICS...</p>
  </div>

  <div id="webgl-container"></div>
  
  <svg id="svg-layer">
    <line id="svg-connector" x1="0" y1="0" x2="0" y2="0" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0"></line>
  </svg>

  <div id="ui-layer">
    <div class="header-container">
      <a href="javascript:history.back()" class="back-button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back
      </a>
      
      <div class="title-group">
        <div class="title-row">
          <h1 class="main-title">Schauberger Repulsine</h1>
          <span class="status-badge">Live Telemetry</span>
        </div>
        <p class="subtext">Implosion Dynamics & Telemetry</p>
      </div>
    </div>

    <div class="controls">
      <button id="theme-toggle">Theme: Auto</button>
      <button id="rotate-toggle" class="active">Auto-Rotate</button>
      <button id="explode-toggle">Exploded View</button>
    </div>
    
    <div class="telemetry-panel" id="info-panel" style="top: 25%; left: 80px;">
      <h2 id="panel-title">Component</h2>
      <p id="panel-desc">Description</p>
      <div class="kpi-container">
        <div class="kpi">
          <span class="kpi-val" id="panel-val-1">0.0</span>
          <span class="kpi-lbl" id="panel-lbl-1">Metric 1</span>
        </div>
        <div class="kpi">
          <span class="kpi-val" id="panel-val-2">0.0</span>
          <span class="kpi-lbl" id="panel-lbl-2">Metric 2</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // 1. SCENE SETUP (Optimized)
    // ==========================================
    const container = document.getElementById('webgl-container');
    const scene = new THREE.Scene();
    
    // Updated Fog to match the dense, atmospheric "bunker" feel in the photo
    scene.fog = new THREE.FogExp2(0x020507, 0.025); 

    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 18, 45); // Adjusted angle to look slightly more down at the unit on its pad

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 15;
    controls.maxDistance = 80;
    controls.maxPolarAngle = Math.PI / 2 - 0.1; // Stay above ground plane

    // ==========================================
    // 2. ENVIRONMENT (Brutalist Testing Bunker)
    // ==========================================
    // Deep, cold background matched to target image
    scene.background = new THREE.Color(0x020507);

    // Optimized Bunker Geometry: One Lathe shape defining the industrial panels
    const bunkerPoints = [
        new THREE.Vector2(0, -5),   // Bottom Center
        new THREE.Vector2(40, -5),  // Floor Edge
        new THREE.Vector2(38, 0),   // Wall Start
        new THREE.Vector2(38, 50),  // Mid-wall
        new THREE.Vector2(30, 80),  // Sloped ceiling
        new THREE.Vector2(0, 80)    // Top Center
    ];
    // Creating the horizontal industrial "panel" look procedurally on the geometry
    const lathedBunkerGeo = new THREE.LatheGeometry(bunkerPoints, 32);
    // Dark industrial material (Metal/Concrete)
    const industrialMat = new THREE.MeshStandardMaterial({ 
        color: 0x06090c, // Deep dark gray
        roughness: 0.9,
        metalness: 0.2,
        side: THREE.BackSide,
        flatShading: false // Ensure smooth look for the silo
    });
    const bunkerRoom = new THREE.Mesh(lathedBunkerGeo, industrialMat);
    bunkerRoom.receiveShadow = true;
    scene.add(bunkerRoom);

    // ZERO-CPU TESTING PAD (Static geometry, procedural detail - highly optimized)
    const padGroup = new THREE.Group();
    padGroup.position.y = -4.9;
    padGroup.rotation.x = -Math.PI / 2;

    // Concretelike material for the floor pad seen in target image
    const padMat = new THREE.MeshStandardMaterial({
        color: 0x0a0d10, // Slightly lighter than walls
        roughness: 0.7,
        metalness: 0.1
    });
    const floorPanel = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), padMat);
    floorPanel.receiveShadow = true;
    padGroup.add(floorPanel);

    // Static Technical Rings (using the Dash-trick v2 used for wind, now pre-calculated for static detail)
    // Optimization: LineDashedMaterial on pre-calculated circles, NO CPU updates after load.
    const technicalMat = new THREE.LineDashedMaterial({
        color: 0x0f766e, // Teal detail color from target image
        linewidth: 1,
        dashSize: 0.5,
        gapSize: 2.5,
        transparent: true,
        opacity: 0.2
    });

    for (let i = 0; i < 6; i++) {
        const r = 5 + i * 6;
        const curve = new THREE.EllipseCurve(0, 0, r, r, 0, 2 * Math.PI, false, 0);
        const points = curve.getPoints(64);
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const circle = new THREE.Line(geometry, technicalMat);
        circle.computeLineDistances(); // Required for dashed lines
        padGroup.add(circle);
    }
    scene.add(padGroup);

    // Optimized Dynamic Lighting (Dramatic, focused contrast like the photo)
    scene.add(new THREE.AmbientLight(0xffffff, 0.15)); // Minimal Ambient for deep shadows
    
    // Focused SpotLight illuminating the craft dramatically
    const mainSpot = new THREE.SpotLight(0xffffff, 2.5, 100, Math.PI/6, 0.8, 1);
    mainSpot.position.set(0, 45, 0); 
    mainSpot.castShadow = true;
    mainSpot.shadow.mapSize.width = 1024; mainSpot.shadow.mapSize.height = 1024;
    scene.add(mainSpot);
    
    // Teal point light for environmental accent color seen in photo
    const accentLight = new THREE.PointLight(0x0f766e, 2.0, 70);
    accentLight.position.set(-20, 10, -20); 
    scene.add(accentLight);

    // ==========================================
    // 3. REPULSINE GEOMETRY (Authentic Machined Shell)
    // ==========================================
    const craftGroup = new THREE.Group();
    craftGroup.position.y = 5;
    scene.add(craftGroup);

    const copperMat = new THREE.MeshStandardMaterial({ color: 0xc27c4a, metalness: 0.95, roughness: 0.3 });
    const highlightMat = new THREE.MeshStandardMaterial({ color: 0x0f766e, metalness: 0.8, roughness: 0.1, emissive: 0x0f766e, emissiveIntensity: 0.5 });
    
    // Intake Cowl
    const intakeRing = new THREE.Mesh(new THREE.TorusGeometry(1.6, 0.25, 16, 64), copperMat);
    intakeRing.rotation.x = Math.PI / 2;
    intakeRing.userData = { baseY: 3.5, expY: 8.0, name: "Intake Cowl", desc: "Draws ambient air into chamber.", v1: "1.2 atm", l1: "Intake Prs", v2: "14 m/s", l2: "Flow" };
    craftGroup.add(intakeRing);

    // Core
    const coreMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00aaff, emissiveIntensity: 0.8 });
    const core = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), coreMat);
    core.userData = { baseY: 0, expY: 0, name: "Suction Core", desc: "Primary cycloidal implosion zone.", v1: "-18 °C", l1: "Core Temp", v2: "0.15 atm", l2: "Pressure" };
    craftGroup.add(core);

    // Aerodynamic Shell
    const hullPoints = [];
    hullPoints.push(new THREE.Vector2(0.75, 3.5));
    hullPoints.push(new THREE.Vector2(1.5, 3.5));
    for (let i = 0; i <= 8; i++) {
        hullPoints.push(new THREE.Vector2(1.5 + Math.sin(i * 0.2) * 2.0, 3.5 - Math.cos(i * 0.2) * 1.0));
    }
    hullPoints.push(new THREE.Vector2(6.5, 1.0));
    hullPoints.push(new THREE.Vector2(7.8, 0.5));
    hullPoints.push(new THREE.Vector2(8.2, 0.0));
    hullPoints.push(new THREE.Vector2(8.2, -0.5));
    hullPoints.push(new THREE.Vector2(7.0, -1.0));
    hullPoints.push(new THREE.Vector2(2.5, -2.5));

    const shellGeo = new THREE.LatheGeometry(hullPoints, 64);
    const shellMat = new THREE.MeshStandardMaterial({ color: 0x4a4d52, metalness: 0.85, roughness: 0.35, side: THREE.DoubleSide });
    const shell = new THREE.Mesh(shellGeo, shellMat);
    shell.castShadow = true;
    shell.userData = { baseY: 0, expY: 4.5, name: "Coanda Hull", desc: "Maintains laminar low-pressure lift.", v1: "12k", l1: "RPM", v2: "1.4 kg", l2: "Load" };
    craftGroup.add(shell);

    // Faint panel lining
    const shellWireMat = new THREE.MeshBasicMaterial({ color: 0x111111, wireframe: true, transparent: true, opacity: 0.15 });
    const shellWire = new THREE.Mesh(shellGeo, shellWireMat);
    shell.add(shellWire);

    // Corrugated Plates
    const plateGroup = new THREE.Group();
    plateGroup.userData = { baseY: 0.7, expY: -3.0 };
    const basePlateGeo = new THREE.CylinderGeometry(5.0, 5.0, 0.05, 128, 1);
    const pV = basePlateGeo.attributes.position;
    for(let i=0; i<pV.count; i++) {
        const x = pV.getX(i), z = pV.getZ(i);
        pV.setY(i, pV.getY(i) + Math.sin(Math.atan2(z, x) * 24) * 0.15 * (Math.sqrt(x*x+z*z)/5.0));
    }
    basePlateGeo.computeVertexNormals();
    for(let j=0; j<3; j++) {
        const p = new THREE.Mesh(basePlateGeo, copperMat);
        p.position.y = j * 0.45; plateGroup.add(p);
    }
    craftGroup.add(plateGroup);

    const plateHitbox = new THREE.Mesh(new THREE.CylinderGeometry(5.2, 5.2, 1.6, 32), new THREE.MeshBasicMaterial({visible: false}));
    plateHitbox.userData = { baseY: 1.2, expY: -2.5, name: "Corrugated Turbine", desc: "Mimics trout-gill dynamics to induce spiraling fluid.", v1: "Copper", l1: "Mat", v2: "Cycloidal", l2: "Flow" };
    craftGroup.add(plateHitbox);

    // 16 Bundled Capillary Tubes
    const pipeGroup = new THREE.Group();
    pipeGroup.userData = { baseY: 2.2, expY: -6.0 };
    const bundleCount = 16;
    for (let i = 0; i < bundleCount; i++) {
        const angle = (i / bundleCount) * Math.PI * 2;
        const bundleRadius = 0.35;
        const offsetX = Math.cos(angle) * bundleRadius;
        const offsetY = Math.sin(angle) * bundleRadius;
        
        const pipeGeo = new THREE.TorusGeometry(4.4 + offsetX, 0.04, 8, 64);
        const pipe = new THREE.Mesh(pipeGeo, copperMat);
        pipe.rotation.x = Math.PI / 2;
        pipe.position.y = offsetY;
        pipeGroup.add(pipe);
    }
    craftGroup.add(pipeGroup);

    const pipeHitbox = new THREE.Mesh(new THREE.TorusGeometry(4.4, 0.6, 16, 32), new THREE.MeshBasicMaterial({visible: false}));
    pipeHitbox.userData = { baseY: 2.2, expY: -6.0, name: "Capillary Whorl", desc: "Dense cluster of copper pipes wrapping the chamber.", v1: "16", l1: "Tubes", v2: "Centripetal", l2: "Vector" };
    craftGroup.add(pipeHitbox);

    // ==========================================
    // 4. ZERO-CPU VORTEX PHYSICS (Curved Wind Gusts)
    // ==========================================
    const windGroup = new THREE.Group();
    const gustCount = 30; // Number of wind trails
    const pointsPerGust = 50; // Smoothness of the curve

    // Dashed material simulates pulses of wind traveling down the curve.
    // Animating the offset allows the geometry to remain 100% static on the CPU!
    const windMat = new THREE.LineDashedMaterial({
        color: 0x00ffff,
        linewidth: 1,
        dashSize: 3.0,
        gapSize: 6.0,
        transparent: true,
        opacity: 0.5,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    for (let i = 0; i < gustCount; i++) {
        const points = [];
        const startAngle = (i / gustCount) * Math.PI * 2 + (Math.random() * 0.5);
        const radiusTop = Math.random() * 4 + 4; 
        const radiusBottom = 0.2; 
        const heightTop = 15 + Math.random() * 5;
        const heightBottom = -4.9;
        
        for (let j = 0; j <= pointsPerGust; j++) {
            const t = j / pointsPerGust; // 0.0 to 1.0 (Top to Bottom)
            
            // Cycloidal curve: radius decreases exponentially as it goes down
            const r = radiusTop * Math.pow(1 - t, 1.5) + radiusBottom;
            const y = heightTop * (1 - t) + heightBottom * t;
            
            // Wind twists faster as it approaches the core (conservation of angular momentum)
            const theta = startAngle + (t * Math.PI * 6); 
            
            points.push(new THREE.Vector3(Math.cos(theta) * r, y, Math.sin(theta) * r));
        }
        
        const gustGeo = new THREE.BufferGeometry().setFromPoints(points);
        const gustLine = new THREE.Line(gustGeo, windMat);
        gustLine.computeLineDistances(); // Required for dashed lines to render properly
        windGroup.add(gustLine);
    }
    
    scene.add(windGroup);

    // ==========================================
    // 5. INTERACTION & UI
    // ==========================================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let hoveredObj = null, originalMat = null;
    const panel = document.getElementById('info-panel');
    const svgConnector = document.getElementById('svg-connector');
    
    const interactables = [intakeRing, core, shell, plateHitbox, pipeHitbox];

    function toScreenPosition(obj, camera) {
      const vector = new THREE.Vector3();
      obj.getWorldPosition(vector);
      vector.project(camera);
      return { x: (vector.x * .5 + .5) * window.innerWidth, y: (vector.y * -.5 + .5) * window.innerHeight };
    }

    window.addEventListener('mousemove', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(interactables);

      if (intersects.length > 0) {
        const obj = intersects[0].object;
        if (hoveredObj !== obj) {
          if (hoveredObj) {
              if (hoveredObj === plateHitbox) plateGroup.children.forEach(c => c.material = originalMat);
              else if (hoveredObj === pipeHitbox) pipeGroup.children.forEach(c => c.material = originalMat);
              else hoveredObj.material = originalMat;
          }
          hoveredObj = obj;
          if (obj === plateHitbox) { originalMat = plateGroup.children[0].material; plateGroup.children.forEach(c => c.material = highlightMat); }
          else if (obj === pipeHitbox) { originalMat = pipeGroup.children[0].material; pipeGroup.children.forEach(c => c.material = highlightMat); }
          else { originalMat = obj.material; obj.material = highlightMat; }

          document.getElementById('panel-title').innerText = obj.userData.name;
          document.getElementById('panel-desc').innerText = obj.userData.desc;
          document.getElementById('panel-val-1').innerText = obj.userData.v1;
          document.getElementById('panel-lbl-1').innerText = obj.userData.l1;
          document.getElementById('panel-val-2').innerText = obj.userData.v2;
          document.getElementById('panel-lbl-2').innerText = obj.userData.l2;
          
          panel.style.display = 'block';
          void panel.offsetWidth; 
          panel.style.opacity = '1';
          svgConnector.setAttribute('opacity', '1');
        }
      } else {
        if (hoveredObj) {
          if (hoveredObj === plateHitbox) plateGroup.children.forEach(c => c.material = originalMat);
          else if (hoveredObj === pipeHitbox) pipeGroup.children.forEach(c => c.material = originalMat);
          else hoveredObj.material = originalMat;
          hoveredObj = null;
          panel.style.opacity = '0'; svgConnector.setAttribute('opacity', '0');
          setTimeout(() => { if(!hoveredObj) panel.style.display = 'none'; }, 300);
        }
      }
    });

    // ==========================================
    // 6. TOGGLES & LIFECYCLE
    // ==========================================
    document.getElementById('explode-toggle').addEventListener('click', function() {
        isExploded = !isExploded;
        this.classList.toggle('active');
    });

    document.getElementById('rotate-toggle').addEventListener('click', function() {
        autoRotate = !autoRotate;
        this.classList.toggle('active');
    });

    // Theme Management Logic
    const themes = ['auto', 'dark', 'light'];
    let tIndex = 0;
    const tBtn = document.getElementById('theme-toggle');

    function applyTheme(themeSetting) {
        let actualTheme = themeSetting;
        if (themeSetting === 'auto') {
            actualTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', actualTheme);
        
        const isLight = actualTheme === 'light';
        
        // Ensure fog matches background color for a seamless fade
        const bgColor = isLight ? 0xfafafa : 0x020406;
        scene.fog.color.setHex(bgColor);
        scene.background = new THREE.Color(bgColor);
        
        // Dynamically shift the telemetry rings so they remain highly visible
        // Dark teal for light mode, bright cyan for dark mode
        if (typeof ringMat !== 'undefined') {
            ringMat.color.setHex(isLight ? 0x0b5c56 : 0x2dd4bf);
        }
    }

    tBtn.addEventListener('click', () => {
        tIndex = (tIndex + 1) % themes.length;
        const selected = themes[tIndex];
        tBtn.innerText = `Theme: ${selected.charAt(0).toUpperCase() + selected.slice(1)}`;
        applyTheme(selected);
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (themes[tIndex] === 'auto') applyTheme('auto');
    });

    applyTheme('auto');

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.1); 
      controls.update();

      // UI Exploded View Lerping
      [intakeRing, core, shell, plateGroup, plateHitbox, pipeGroup, pipeHitbox].forEach(child => {
         const target = isExploded ? child.userData.expY : child.userData.baseY;
         child.position.y += (target - child.position.y) * 0.1;
      });

      // Differential Rotation
      if (autoRotate) craftGroup.rotation.y += 0.5 * delta;
      shell.rotation.y -= 1.0 * delta;
      plateGroup.rotation.y -= 3.0 * delta;

      // Zero-CPU Wind Gust Animation
      // The geometry is fully static; we only spin the group and offset the dash texture!
      if (typeof windGroup !== 'undefined' && typeof windMat !== 'undefined') {
          windGroup.rotation.y += 1.5 * delta; 
          windMat.dashOffset -= 15.0 * delta;  
      }

      // Zero-CPU Telemetry Pad Animation (Flows inward)
      if (typeof ringMat !== 'undefined') {
          ringMat.dashOffset += 10.0 * delta;
      }

      // SVG Line Tracking
      if (typeof hoveredObj !== 'undefined' && hoveredObj) {
        let target = hoveredObj;
        if(hoveredObj === plateHitbox) target = plateGroup.children[1];
        if(hoveredObj === pipeHitbox) target = pipeGroup.children[0];
        
        const screenPos = toScreenPosition(target, camera);
        const panelRect = panel.getBoundingClientRect();
        svgConnector.setAttribute('x1', screenPos.x);
        svgConnector.setAttribute('y1', screenPos.y);
        svgConnector.setAttribute('x2', panelRect.left - 5);
        svgConnector.setAttribute('y2', panelRect.top + 24);
      }

      // Render standard scene (highly optimized)
      renderer.render(scene, camera);
    }

    window.onload = () => {
      setTimeout(() => {
        const overlay = document.getElementById('overlay');
        if(overlay) {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        }
      }, 800);
      animate();
    };
  </script>
</body>
</html>
