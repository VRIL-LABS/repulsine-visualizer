<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repulsine Launch Pass 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:#00f4c0;
      --teal-soft:#8cfff5;
      --copper:#c27c4a;
      --bg0:#02040a;
      --bg1:#06111c;
      --bg2:#081d28;
      --ease:cubic-bezier(.16,1,.3,1);
      --snap:cubic-bezier(.7,0,.2,1);
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;overflow:hidden;font-family:Orbitron,system-ui,sans-serif;color:rgba(235,255,250,.96);
      background:
        radial-gradient(circle at 18% 12%, rgba(0,244,192,.12), transparent 24%),
        radial-gradient(circle at 78% 82%, rgba(194,124,74,.08), transparent 22%),
        linear-gradient(160deg, var(--bg0), var(--bg1) 48%, var(--bg2));
    }
    .space,.space::before,.space::after{position:fixed;inset:-20%;content:"";pointer-events:none;background-repeat:repeat;animation:drift 18s linear infinite}
    .space{background-image:radial-gradient(circle at 14% 22%, rgba(255,255,255,.95) 0 1px, transparent 1.8px),radial-gradient(circle at 72% 60%, rgba(140,255,245,.9) 0 1px, transparent 1.8px),radial-gradient(circle at 84% 20%, rgba(255,255,255,.8) 0 .9px, transparent 1.6px),radial-gradient(circle at 44% 82%, rgba(255,255,255,.75) 0 1px, transparent 1.8px);background-size:240px 240px,320px 320px,280px 280px,360px 360px;opacity:.86}
    .space::before{background-image:radial-gradient(circle at 24% 40%, rgba(255,255,255,.72) 0 1px, transparent 1.8px),radial-gradient(circle at 68% 18%, rgba(0,244,192,.85) 0 1px, transparent 1.8px);background-size:420px 420px,390px 390px;opacity:.45;animation-duration:30s}
    .space::after{background:radial-gradient(circle at 50% 52%, rgba(0,244,192,.08), transparent 18%), radial-gradient(circle at 50% 52%, rgba(0,255,255,.06), transparent 30%);filter:blur(16px);opacity:.95;animation:none}
    .scene{position:relative;width:100%;height:100%;display:grid;place-items:center;isolation:isolate}
    .hud{position:absolute;top:48px;left:50%;transform:translateX(-50%);display:grid;gap:10px;text-align:center;transition:opacity .35s var(--ease),transform .35s var(--ease);z-index:5}
    .hud .tag{justify-self:center;padding:8px 14px;border-radius:999px;background:rgba(2,5,7,.58);border:1px solid rgba(0,244,192,.14);color:rgba(0,244,192,.8);font-size:11px;letter-spacing:.22em;text-transform:uppercase;backdrop-filter:blur(8px)}
    .hud h1{margin:0;font-size:clamp(28px,4vw,52px);line-height:1;letter-spacing:.12em;text-transform:uppercase}
    .hud p{margin:0;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,244,192,.64)}
    .pad{position:relative;width:420px;height:460px;display:grid;place-items:center;perspective:1200px;transform-style:preserve-3d}
    .ambient-canvas{
      position:absolute;inset:-180px;border-radius:50%;pointer-events:none;
      background:
        radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(140,255,245,var(--ambient,.0)) 0, rgba(0,244,192,calc(var(--ambient,.0) * .7)) 14%, rgba(0,244,192,0) 42%),
        radial-gradient(circle at 50% 50%, rgba(0,244,192,.12), transparent 38%);
      filter: blur(28px);
      opacity: 1;
      transform: scale(1);
      transition: filter .2s var(--ease), transform .2s var(--ease);
    }
    .backlight{position:absolute;width:390px;height:390px;border-radius:50%;background:radial-gradient(circle, rgba(0,244,192,.25) 0, rgba(0,244,192,.08) 30%, transparent 66%);filter:blur(30px);opacity:.8;transition:transform .5s var(--ease),opacity .5s var(--ease),filter .5s var(--ease)}
    .shockwave{position:absolute;width:320px;height:320px;border-radius:50%;border:1px solid rgba(140,255,245,.75);box-shadow:0 0 22px rgba(140,255,245,.24), inset 0 0 18px rgba(140,255,245,.18);opacity:0;transform:scale(.2);pointer-events:none}
    .warp{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .22s linear}
    .warp .line{position:absolute;left:50%;top:50%;width:2px;height:160px;transform-origin:center -180px;background:linear-gradient(180deg, rgba(255,255,255,0), rgba(140,255,245,.95), rgba(255,255,255,0));filter:blur(.3px);opacity:.8}
    .warp .line:nth-child(1){transform:translate(-50%,-50%) rotate(0deg)} .warp .line:nth-child(2){transform:translate(-50%,-50%) rotate(22.5deg)} .warp .line:nth-child(3){transform:translate(-50%,-50%) rotate(45deg)} .warp .line:nth-child(4){transform:translate(-50%,-50%) rotate(67.5deg)} .warp .line:nth-child(5){transform:translate(-50%,-50%) rotate(90deg)} .warp .line:nth-child(6){transform:translate(-50%,-50%) rotate(112.5deg)} .warp .line:nth-child(7){transform:translate(-50%,-50%) rotate(135deg)} .warp .line:nth-child(8){transform:translate(-50%,-50%) rotate(157.5deg)} .warp .line:nth-child(9){transform:translate(-50%,-50%) rotate(180deg)} .warp .line:nth-child(10){transform:translate(-50%,-50%) rotate(202.5deg)} .warp .line:nth-child(11){transform:translate(-50%,-50%) rotate(225deg)} .warp .line:nth-child(12){transform:translate(-50%,-50%) rotate(247.5deg)} .warp .line:nth-child(13){transform:translate(-50%,-50%) rotate(270deg)} .warp .line:nth-child(14){transform:translate(-50%,-50%) rotate(292.5deg)} .warp .line:nth-child(15){transform:translate(-50%,-50%) rotate(315deg)} .warp .line:nth-child(16){transform:translate(-50%,-50%) rotate(337.5deg)}
    .repulsine{
      position:relative;width:270px;aspect-ratio:1;border:0;padding:0;background:none;cursor:pointer;isolation:isolate;transform-style:preserve-3d;
      transition:transform .18s var(--snap), opacity .2s linear, filter .18s var(--ease);
    }
    .repulsine:hover{transform:translateY(-2px) scale(1.01)}
    .repulsine:active{transform:translateY(6px) scale(.985)}
    .shadow,.disc,.rim,.ring,.comet,.orbit,.beam,.trail,.core,.glass,.flash,.charge-glow{position:absolute;inset:0;border-radius:50%;pointer-events:none}
    .shadow{inset:30px;transform:translateY(40px) scaleY(.22);background:radial-gradient(circle, rgba(0,0,0,.78), transparent 72%);filter:blur(18px);transition:opacity .3s var(--ease),transform .3s var(--ease)}
    .disc{background:radial-gradient(circle at 30% 22%, rgba(255,255,255,.3), transparent 16%),radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,.14), transparent 22%),radial-gradient(circle at 50% 40%, rgba(0,244,192,.14), transparent 34%),radial-gradient(ellipse at 50% 74%, rgba(0,0,0,.36), transparent 64%),radial-gradient(circle, #21343c 0, #122028 56%, #06090d 100%);border:1px solid rgba(190,255,247,.26);box-shadow:inset 0 1px 0 rgba(255,255,255,.05), 0 20px 40px rgba(0,0,0,.34), 0 0 26px rgba(0,244,192,.1);transition:transform .2s var(--ease), box-shadow .2s var(--ease), border-color .2s var(--ease), filter .2s var(--ease)}
    .rim{inset:12px;background:radial-gradient(ellipse at 50% 60%, rgba(0,0,0,.56) 0, rgba(0,0,0,.08) 44%, transparent 76%);mask:radial-gradient(circle, transparent 54%, black 58%, black 79%, transparent 82%);-webkit-mask:radial-gradient(circle, transparent 54%, black 58%, black 79%, transparent 82%);border:1px solid rgba(0,244,192,.08)}
    .charge-glow{inset:-22px;background:radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(140,255,245,calc(var(--charge,.0) * .45)) 0, rgba(0,244,192,calc(var(--charge,.0) * .25)) 26%, transparent 58%);filter:blur(16px);opacity:1;transition:filter .2s var(--ease)}
    .ring.outer{inset:7px;background:conic-gradient(from 0deg, transparent 0deg 18deg, rgba(255,220,180,.92) 24deg 40deg, transparent 46deg 90deg, rgba(145,255,248,.98) 96deg 118deg, transparent 124deg 178deg, rgba(120,255,250,.94) 184deg 204deg, transparent 210deg 264deg, rgba(255,220,180,.86) 270deg 286deg, transparent 292deg 360deg);mask:radial-gradient(circle, transparent 61%, black 63%, black 72%, transparent 74%);-webkit-mask:radial-gradient(circle, transparent 61%, black 63%, black 72%, transparent 74%);mix-blend-mode:screen;animation:spin var(--spin-speed,6.8s) linear infinite;filter:drop-shadow(0 0 calc(18px * var(--charge,.0)) rgba(140,255,245,.55))}
    .ring.inner{inset:40px;background:conic-gradient(from 180deg, transparent 0deg 28deg, rgba(170,255,250,1) 36deg 62deg, transparent 70deg 140deg, rgba(255,255,255,.76) 146deg 166deg, transparent 172deg 242deg, rgba(140,255,244,.98) 248deg 278deg, transparent 284deg 360deg);mask:radial-gradient(circle, transparent 34%, black 38%, black 48%, transparent 52%);-webkit-mask:radial-gradient(circle, transparent 34%, black 38%, black 48%, transparent 52%);mix-blend-mode:screen;animation:spin-rev var(--inner-speed,5.2s) linear infinite}
    .comet{inset:-8px;background:conic-gradient(from 0deg, transparent 0deg 336deg, rgba(255,255,255,0) 336deg 343deg, rgba(140,255,245,.92) 344deg 350deg, rgba(255,255,255,1) 351deg 354deg, rgba(255,220,180,.88) 355deg 358deg, transparent 359deg 360deg);mask:radial-gradient(circle, transparent 69%, black 71%, black 74%, transparent 76%);-webkit-mask:radial-gradient(circle, transparent 69%, black 71%, black 74%, transparent 76%);filter:blur(.8px) drop-shadow(0 0 12px rgba(140,255,245,.42));animation:spin var(--comet-speed,2.2s) linear infinite}
    .orbit{animation:spin var(--orbit-speed,8s) linear infinite}
    .orbit .dot{position:absolute;top:50%;left:50%;width:8px;height:8px;margin:-4px 0 0 -4px;border-radius:50%;background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.55) 0, rgba(194,124,74,.95) 48%, rgba(119,60,18,.82) 100%);box-shadow:0 0 4px rgba(194,124,74,.7), 0 0 10px rgba(0,244,192,.08)}
    .orbit .dot:nth-child(1){transform:rotate(0deg) translateY(-96px)} .orbit .dot:nth-child(2){transform:rotate(60deg) translateY(-96px)} .orbit .dot:nth-child(3){transform:rotate(120deg) translateY(-96px)} .orbit .dot:nth-child(4){transform:rotate(180deg) translateY(-96px)} .orbit .dot:nth-child(5){transform:rotate(240deg) translateY(-96px)} .orbit .dot:nth-child(6){transform:rotate(300deg) translateY(-96px)}
    .core{inset:74px;background:radial-gradient(circle at 38% 32%, rgba(255,255,255,.98) 0, rgba(255,255,255,.16) 18%, transparent 28%), radial-gradient(circle at 50% 50%, rgba(235,255,255,1) 0, rgba(150,255,246,.98) 22%, rgba(0,244,192,.74) 48%, transparent 72%);box-shadow:0 0 calc(26px + 30px * var(--charge,.0)) rgba(150,255,246,.5), 0 0 calc(56px + 40px * var(--charge,.0)) rgba(130,255,245,.2);animation:pulse 2s ease-in-out infinite;transition:transform .2s var(--ease), opacity .2s linear, filter .2s var(--ease), box-shadow .2s var(--ease)}
    .glass{display:grid;place-items:center}.glass span{display:inline-grid;gap:8px;padding:16px 22px;border-radius:22px;background:rgba(4,8,12,.34);border:1px solid rgba(255,255,255,.04);backdrop-filter:blur(6px)} .glass em{font-style:normal;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:rgba(0,244,192,.64)} .glass strong{font-size:18px;letter-spacing:.16em;text-transform:uppercase;color:rgba(241,255,251,.98)}
    .beam{inset:auto 94px -76px 94px;height:156px;border-radius:0 0 26px 26px / 0 0 100% 100%;clip-path:polygon(18% 0%,82% 0%,100% 100%,0% 100%);background:linear-gradient(180deg, rgba(0,244,192,.18) 0%, rgba(0,244,192,.08) 40%, rgba(0,244,192,.03) 74%, transparent 100%);opacity:.12;transform:translateY(8px) scaleY(.72);transform-origin:top center;filter:blur(2px);mix-blend-mode:screen;transition:opacity .16s var(--ease), transform .16s var(--ease), filter .16s var(--ease), background .16s var(--ease)}
    .beam::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(180deg, transparent 0px, transparent 7px, rgba(0,244,192,.08) 7px, rgba(0,244,192,.08) 8px);animation:beam 1s linear infinite}
    .trail{inset:auto 98px -88px 98px;height:168px;border-radius:0 0 26px 26px / 0 0 100% 100%;clip-path:polygon(22% 0%,78% 0%,100% 100%,0% 100%);background:linear-gradient(180deg, rgba(194,124,74,.28) 0%, rgba(0,244,192,.08) 24%, rgba(0,244,192,.03) 70%, transparent 100%);opacity:.15;transform:translateY(16px) scaleY(.62);filter:blur(10px);transition:opacity .22s var(--ease), transform .22s var(--ease)}
    .flash{width:420px;height:420px;margin:-75px;opacity:0;transform:scale(.3);background:radial-gradient(circle, rgba(255,255,255,.96) 0, rgba(140,255,245,.48) 12%, rgba(0,244,192,.18) 24%, transparent 58%);filter:blur(8px)}
    .status{position:absolute;bottom:46px;left:50%;transform:translateX(-50%);text-align:center;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,244,192,.74);transition:opacity .25s var(--ease), transform .25s var(--ease)}

    .scene.hovering .ambient-canvas{filter:blur(34px);transform:scale(1.04)}
    .scene.hovering .backlight{transform:scale(1.1);opacity:1;filter:blur(36px)}
    .scene.hovering .disc{box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 24px 44px rgba(0,0,0,.36), 0 0 38px rgba(0,244,192,.16);border-color:rgba(208,255,248,.34)}
    .scene.hovering .beam{opacity:.54;transform:translateY(3px) scaleY(.96);background:linear-gradient(180deg, rgba(0,244,192,.34) 0%, rgba(0,244,192,.14) 40%, rgba(0,244,192,.05) 74%, transparent 100%)}
    .scene.hovering .repulsine{animation:chargeWobble .22s ease-in-out infinite alternate;filter:drop-shadow(0 0 18px rgba(140,255,245,.14))}

    .scene.launching .hud{opacity:0;transform:translateX(-50%) translateY(-10px)}
    .scene.launching .backlight{transform:scale(1.28);opacity:1;filter:blur(42px)}
    .scene.launching .repulsine{animation:launch .95s var(--snap) forwards}
    .scene.launching .disc{animation:implode .34s var(--ease) forwards}
    .scene.launching .ring.outer{animation:ringOut .34s var(--ease) forwards}
    .scene.launching .ring.inner{animation:ringIn .3s var(--ease) forwards}
    .scene.launching .orbit{animation:orbitCrush .3s var(--ease) forwards}
    .scene.launching .comet{animation:cometBurst .3s var(--ease) forwards}
    .scene.launching .core{animation:coreImplode .28s var(--ease) forwards}
    .scene.launching .glass{animation:uiVanish .18s linear forwards}
    .scene.launching .beam{animation:beamFire .7s var(--ease) forwards;opacity:1}
    .scene.launching .trail{animation:trailFire .76s var(--ease) forwards;opacity:.92}
    .scene.launching .flash{animation:flash .34s var(--ease) forwards}
    .scene.launching .shockwave{animation:shock .56s var(--ease) forwards}
    .scene.launching .shadow{opacity:0;transform:translateY(72px) scaleY(.08)}
    .scene.launching .warp{opacity:1;animation:warp .58s linear forwards}
    .scene.launching .status{transform:translateX(-50%) translateY(-6px);color:rgba(140,255,245,.86)}

    @keyframes drift{to{transform:translate3d(-4%,-6%,0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes spin-rev{to{transform:rotate(-360deg)}}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(calc(1.05 + .08 * var(--charge,.0)))}}
    @keyframes beam{to{background-position-y:14px}}
    @keyframes chargeWobble{0%{transform:translate3d(-1px,0,0) rotateZ(-.6deg)}100%{transform:translate3d(1px,-1px,0) rotateZ(.8deg)}}
    @keyframes implode{0%{transform:scale(1);opacity:1}55%{transform:scale(.78);opacity:1}100%{transform:scale(.12);opacity:0;filter:blur(2px)}}
    @keyframes ringOut{to{transform:rotate(140deg) scale(.16);opacity:0}}
    @keyframes ringIn{to{transform:rotate(-180deg) scale(.1);opacity:0}}
    @keyframes orbitCrush{to{transform:rotate(220deg) scale(.12);opacity:0}}
    @keyframes cometBurst{to{transform:rotate(180deg) scale(1.16);opacity:0;filter:blur(4px) drop-shadow(0 0 22px rgba(140,255,245,.6))}}
    @keyframes coreImplode{0%{transform:scale(1);opacity:1}42%{transform:scale(1.4);opacity:1}100%{transform:scale(.05);opacity:0;filter:blur(8px)}}
    @keyframes uiVanish{to{opacity:0;transform:scale(.82);filter:blur(6px)}}
    @keyframes beamFire{0%{transform:translateY(8px) scaleY(.8);opacity:.35}28%{transform:translateY(0) scaleY(1.8);opacity:1}100%{transform:translateY(-46px) scaleY(2.8);opacity:0}}
    @keyframes trailFire{0%{transform:translateY(18px) scaleY(.55);opacity:0}24%{transform:translateY(4px) scaleY(1.5);opacity:.84}100%{transform:translateY(-26px) scaleY(3);opacity:0}}
    @keyframes flash{0%{opacity:0;transform:scale(.2)}30%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.4)}}
    @keyframes shock{0%{opacity:.95;transform:scale(.18)}100%{opacity:0;transform:scale(2.2)}}
    @keyframes warp{0%{opacity:0;transform:scale(.6)}30%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.45)}}
    @keyframes launch{0%{transform:translateY(0) scale(1) rotateX(0deg);opacity:1}18%{transform:translateY(12px) scale(.98) rotateX(10deg);opacity:1}38%{transform:translateY(-10px) scale(1.04) rotateX(-10deg);opacity:1}72%{transform:translateY(-180px) scale(.38) rotateX(30deg);opacity:1}100%{transform:translateY(-520px) scale(.02) rotateX(54deg);opacity:0}}

    @media (max-width:700px){.pad{transform:scale(.82)}.status{width:min(90vw,520px)}}
    @media (prefers-reduced-motion:reduce){.space,.space::before,.ring.outer,.ring.inner,.comet,.orbit,.core,.beam::before,.scene.hovering .repulsine{animation:none!important}.scene.launching .repulsine,.scene.launching .disc,.scene.launching .ring.outer,.scene.launching .ring.inner,.scene.launching .orbit,.scene.launching .comet,.scene.launching .core,.scene.launching .glass,.scene.launching .beam,.scene.launching .trail,.scene.launching .flash,.scene.launching .shockwave,.scene.launching .warp{animation:none!important}}
  
    .craft-shell{overflow:visible!important;}
    .ambient-canvas,.reactive-light{pointer-events:none;filter:blur(0px);}
    .ambient-canvas{position:absolute;inset:-180px;overflow:visible;}
    .reactive-light{position:absolute;inset:-180px;overflow:visible;mix-blend-mode:screen;opacity:.92;}

    .glass-engage{
      position:absolute;
      left:50%;top:50%;
      transform:translate(-50%,-50%);
      background:transparent!important;
      border:none!important;
      box-shadow:none!important;
      backdrop-filter:none!important;
      -webkit-backdrop-filter:none!important;
      padding:0!important;
      z-index:12;
      opacity:0;
      transition:opacity .35s ease, transform .45s cubic-bezier(.16,1,.3,1);
      pointer-events:none;
    }
    .ship:hover .glass-engage{opacity:1;transform:translate(-50%,-50%) translateY(4px);}
    .engage-face{
      position:relative;
      display:inline-flex;align-items:center;justify-content:center;
      min-width:132px;height:42px;padding:0 18px;
      border-radius:999px;
      background:linear-gradient(180deg,#dfe7ea 0%,#c8d2d8 100%);
      color:#6f7f86;
      letter-spacing:.22em;
      text-transform:uppercase;
      font-weight:800;
      font-size:12px;
      text-shadow:1px 1px 0 rgba(255,255,255,.72), -1px -1px 0 rgba(137,151,160,.18);
      box-shadow:
        -10px -10px 22px rgba(255,255,255,.85),
        10px 12px 24px rgba(138,154,163,.33),
        inset -2px -2px 4px rgba(255,255,255,.75),
        inset 2px 2px 4px rgba(133,149,158,.18);
      border:1px solid rgba(255,255,255,.55);
      overflow:hidden;
      isolation:isolate;
    }
    .engage-face::before{
      content:"";
      position:absolute;inset:-60%;
      background:
        radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(255,255,255,.95) 0%, rgba(255,255,255,.42) 10%, rgba(255,255,255,0) 28%),
        radial-gradient(circle at calc(var(--mx,50%) + 8%) calc(var(--my,50%) + 12%), rgba(64,224,208,.18) 0%, rgba(64,224,208,0) 26%),
        radial-gradient(circle at calc(var(--mx,50%) - 10%) calc(var(--my,50%) - 8%), rgba(255,183,77,.14) 0%, rgba(255,183,77,0) 22%);
      opacity:.65;
      transition:opacity .22s ease;
      pointer-events:none;
      z-index:-1;
    }
    .ship:hover .engage-face::before{opacity:.95;}
    .engage-face strong{transform:translateY(-1px);}

    .ship[data-phase="arming"] .engage-face,
    .ship[data-phase="charging"] .engage-face{
      color:#49636b;
      box-shadow:
        -12px -12px 26px rgba(255,255,255,.92),
        12px 14px 28px rgba(128,144,153,.38),
        inset -2px -2px 5px rgba(255,255,255,.85),
        inset 2px 2px 6px rgba(120,138,148,.22),
        0 0 18px rgba(93,255,237,.18);
    }
    .ship[data-phase="charging"] .engage-face::after{
      content:"";
      position:absolute;inset:-40%;border-radius:999px;
      background:
        radial-gradient(circle at 30% 50%, rgba(89,255,245,.22), transparent 18%),
        radial-gradient(circle at 65% 35%, rgba(255,190,92,.16), transparent 14%),
        radial-gradient(circle at 72% 68%, rgba(188,124,255,.12), transparent 12%);
      animation: sporadic-bursts 1.8s steps(1,end) infinite;
      pointer-events:none;
      mix-blend-mode:screen;
    }
    @keyframes sporadic-bursts{
      0%,18%,22%,49%,53%,78%,100%{opacity:0;transform:scale(.96) rotate(0deg)}
      20%{opacity:.95;transform:scale(1.02) rotate(8deg)}
      51%{opacity:.8;transform:scale(1.03) rotate(-6deg)}
      80%{opacity:.72;transform:scale(1.05) rotate(5deg)}
    }

</style>
</head>
<body>
  <div class="space" aria-hidden="true"></div>
  <main class="scene" id="scene">
    <div class="hud">
      <div class="tag">VRIL LABS / PASS 3 / REACTIVE HOVER</div>
      <h1>Repulsine Warp Launch</h1>
      <p>Mouse-tracked ambient bleed · charging wobble · glowing rotor</p>
    </div>
    <div class="pad" id="pad">
      <div class="ambient-canvas" aria-hidden="true"></div>
      <div class="backlight" aria-hidden="true"></div>
      <div class="shockwave" aria-hidden="true"></div>
      <div class="warp" aria-hidden="true">
        <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
        <div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div>
      </div>
      <button class="repulsine" id="launchButton" aria-label="Launch repulsine craft">
        <span class="shadow"></span>
        <span class="trail"></span>
        <span class="beam"></span>
        <span class="charge-glow"></span>
        <span class="disc"></span>
        <span class="rim"></span>
        <span class="ring outer"></span>
        <span class="ring inner"></span>
        <span class="comet"></span>
        <span class="orbit" aria-hidden="true">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </span>
        <span class="core"></span>
        <span class="glass glass-engage glass-engage-marker"><span class="engage-face"><strong>Engage</strong></span></span>
        <span class="flash"></span>
      </button>
    </div>
    <div class="status" id="status">Hover to charge · click to implode and warp out</div>
  </main>
  <script>
    const scene = document.getElementById('scene');
    const pad = document.getElementById('pad');
    const button = document.getElementById('launchButton');
    const status = document.getElementById('status');
    let busy = false;

    function setPointerVars(event) {
      const rect = button.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * 100;
      const y = ((event.clientY - rect.top) / rect.height) * 100;
      const cx = Math.max(0, Math.min(100, x));
      const cy = Math.max(0, Math.min(100, y));
      button.style.setProperty('--mx', cx + '%');
      button.style.setProperty('--my', cy + '%');
      pad.style.setProperty('--mx', cx + '%');
      pad.style.setProperty('--my', cy + '%');
    }

    function enterHover(event) {
      if (busy) return;
      scene.classList.add('hovering');
      button.style.setProperty('--charge', '.95');
      button.style.setProperty('--spin-speed', '2.1s');
      button.style.setProperty('--inner-speed', '1.8s');
      button.style.setProperty('--orbit-speed', '4.2s');
      button.style.setProperty('--comet-speed', '1.05s');
      pad.style.setProperty('--ambient', '.95');
      setPointerVars(event);
    }

    function leaveHover() {
      if (busy) return;
      scene.classList.remove('hovering');
      button.style.setProperty('--charge', '0');
      button.style.setProperty('--spin-speed', '6.8s');
      button.style.setProperty('--inner-speed', '5.2s');
      button.style.setProperty('--orbit-speed', '8s');
      button.style.setProperty('--comet-speed', '2.2s');
      pad.style.setProperty('--ambient', '0');
      button.style.setProperty('--mx', '50%');
      button.style.setProperty('--my', '50%');
      pad.style.setProperty('--mx', '50%');
      pad.style.setProperty('--my', '50%');
    }

    function moveHover(event) {
      if (busy) return;
      setPointerVars(event);
    }

    function runLaunch() {
      if (busy) return;
      busy = true;
      scene.classList.remove('hovering');
      scene.classList.remove('launching');
      void scene.offsetWidth;
      scene.classList.add('launching');
      status.textContent = 'Launch in progress';
      setTimeout(() => { status.textContent = 'Hover to charge · click to implode and warp out'; }, 1100);
      setTimeout(() => {
        scene.classList.remove('launching');
        leaveHover();
        busy = false;
      }, 1350);
    }

    button.addEventListener('mouseenter', enterHover);
    button.addEventListener('mousemove', moveHover);
    button.addEventListener('mouseleave', leaveHover);
    button.addEventListener('click', runLaunch);
    button.addEventListener('keydown', (e) => {
      if ((e.key === 'Enter' || e.key === ' ') && !busy) {
        e.preventDefault();
        runLaunch();
      }
    });
  </script>

<script>
document.addEventListener('pointermove',e=>{
  document.querySelectorAll('.ship, .engage-face').forEach(el=>{
    const r = el.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width) * 100;
    const y = ((e.clientY - r.top) / r.height) * 100;
    el.style.setProperty('--mx', Math.max(0, Math.min(100, x)) + '%');
    el.style.setProperty('--my', Math.max(0, Math.min(100, y)) + '%');
  });
});
</script>

</body>
</html>
