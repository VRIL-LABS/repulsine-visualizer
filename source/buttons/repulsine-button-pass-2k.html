<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Repulsine Pass 2K</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0} html,body{height:100%;overflow:hidden}
body{font-family:Inter,system-ui,sans-serif;display:grid;place-items:center;min-height:100dvh;background:radial-gradient(circle at 12% 0%,rgba(255,255,255,.84),transparent 30%),radial-gradient(circle at 88% 100%,rgba(255,255,255,.62),transparent 26%),linear-gradient(162deg,#f4f7fb 0%,#eaf0f5 46%,#dce5ee 100%)}
.stage{width:min(96vw,1260px);padding:32px;display:grid;place-items:center}
.panel{position:relative;width:min(980px,94vw);min-height:820px;border-radius:44px;background:linear-gradient(145deg,#edf3f8,#dee7ee);box-shadow:38px 38px 76px rgba(160,176,194,.44),-32px -32px 68px rgba(255,255,255,.98),inset 1px 1px 0 rgba(255,255,255,.82),inset -1px -1px 0 rgba(168,184,200,.2);display:grid;place-items:center;padding:92px 32px 126px;overflow:visible}
.panel::before{content:"";position:absolute;inset:28px;border-radius:36px;pointer-events:none;background:linear-gradient(145deg,rgba(255,255,255,.3),rgba(255,255,255,.04));box-shadow:inset 22px 22px 36px rgba(170,186,202,.22),inset -20px -20px 32px rgba(255,255,255,.48)}
.panel-tag,.panel-note{position:absolute;z-index:10;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:rgba(88,104,120,.56)}
.panel-tag{top:34px;left:40px}.panel-note{right:42px;bottom:38px;color:rgba(88,104,120,.42)}
.scene{position:relative;width:min(100%,820px);height:680px;perspective:600px;overflow:visible;display:grid;place-items:center}
.underlay{position:absolute;inset:0;pointer-events:none;overflow:visible;z-index:1}
.aura,.well,.field-shell,.force-ring,.shadow-umbra{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);pointer-events:none}
.aura{width:800px;height:800px;border-radius:50%;background:radial-gradient(circle at 50% 52%,rgba(255,255,255,.74) 0 8%,rgba(255,255,255,.18) 14%,transparent 36%),radial-gradient(circle at 50% 52%,rgba(57,223,200,.08) 0 16%,transparent 34%);filter:blur(22px);opacity:.86}
.well{width:450px;height:450px;border-radius:50%;background:linear-gradient(145deg,#dae4ec,#ecf3f8);box-shadow:inset 34px 34px 46px rgba(168,182,198,.6),inset -28px -28px 44px rgba(255,255,255,.98),0 0 0 1px rgba(255,255,255,.46)}
.field-shell{width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.48) 0 26%,rgba(255,255,255,.14) 38%,rgba(255,255,255,.02) 56%,transparent 72%),radial-gradient(circle,rgba(57,223,200,.36) 0 20%,rgba(57,223,200,.12) 38%,transparent 68%);box-shadow:0 0 32px rgba(255,255,255,.36),0 0 52px rgba(57,223,200,.2),0 0 88px rgba(57,223,200,.08);opacity:0;transform:translate(-50%,-50%) scale(.01);will-change:transform,opacity}
.force-ring{width:350px;height:350px;border-radius:50%;opacity:0;background:radial-gradient(circle,transparent 54%,rgba(255,255,255,.9) 60%,rgba(255,255,255,.16) 65%,transparent 71%);will-change:transform,opacity}
.shadow-umbra{width:292px;height:112px;border-radius:50%;background:radial-gradient(circle,rgba(108,122,136,.46) 0,rgba(108,122,136,.18) 40%,transparent 74%);filter:blur(12px);opacity:.3;transform:translate(-50%,-50%) translateY(162px) scale(1);will-change:transform,opacity,filter}
.tilt-stage,.tilt-body,.saucer{transform-style:preserve-3d}.tilt-stage{position:relative;width:570px;height:430px;z-index:5;display:grid;place-items:center}.tilt-body{position:relative;width:570px;height:430px;transform:rotateX(0deg) rotateY(0deg);transition:transform 72ms linear;will-change:transform;display:grid;place-items:center}
.saucer{position:absolute;left:50%;top:50%;width:430px;height:252px;margin:-126px 0 0 -215px;background:none;border:none;padding:0;cursor:pointer;overflow:visible;will-change:transform}.saucer:focus-visible{outline:2px solid rgba(57,223,200,.6);outline-offset:10px;border-radius:50%}
.s-main,.s-belly,.s-rim,.s-ring-a,.s-ring-b,.s-seams,.s-apertures,.s-veins,.s-core,.s-shine,.engage-svg{position:absolute;pointer-events:none}
.s-main{inset:18px 10px 46px;border-radius:50%;transform:translateZ(14px);background:radial-gradient(circle at 30% 22%,rgba(255,255,255,.99) 0 6%,rgba(255,255,255,.22) 13%,transparent 27%),radial-gradient(circle at 52% 48%,rgba(255,255,255,.14) 0 26%,transparent 56%),linear-gradient(180deg,#f8fbfd 0%,#ecf2f7 26%,#dfe9f0 62%,#d2dce6 100%);box-shadow:-22px -22px 34px rgba(255,255,255,.98),22px 28px 40px rgba(160,174,190,.6),inset -18px -18px 22px rgba(255,255,255,.66),inset 16px 20px 22px rgba(178,192,206,.3)}
.s-belly{left:88px;right:88px;bottom:50px;height:56px;border-radius:50%;transform:translateZ(0px) scaleY(.84);background:linear-gradient(180deg,rgba(216,225,234,.66),rgba(192,203,215,.96));box-shadow:inset 0 10px 12px rgba(255,255,255,.38),inset 0 -10px 12px rgba(153,167,182,.28)}
.s-rim{inset:40px 54px 62px;border-radius:50%;transform:translateZ(18px);background:linear-gradient(145deg,rgba(255,255,255,.76),rgba(208,218,226,.66));-webkit-mask:radial-gradient(circle,transparent 57%,black 62%,black 71%,transparent 76%);mask:radial-gradient(circle,transparent 57%,black 62%,black 71%,transparent 76%)}
.s-ring-a{inset:58px 78px 74px;border-radius:50%;transform:translateZ(22px) rotate(0deg);background:conic-gradient(from 90deg,rgba(255,255,255,.28),rgba(255,255,255,.05),rgba(57,223,200,.22),rgba(255,194,92,.28),rgba(57,223,200,.18),rgba(255,255,255,.28));-webkit-mask:radial-gradient(circle,transparent 54%,black 59%,black 67%,transparent 72%);mask:radial-gradient(circle,transparent 54%,black 59%,black 67%,transparent 72%);opacity:.88;will-change:transform}
.s-ring-b{inset:90px 114px 100px;border-radius:50%;transform:translateZ(26px) rotate(0deg);background:conic-gradient(from 28deg,rgba(255,255,255,.22),rgba(255,255,255,0),rgba(255,194,92,.36),rgba(255,255,255,0),rgba(57,223,200,.38),rgba(255,255,255,.22));-webkit-mask:radial-gradient(circle,transparent 45%,black 52%,black 59%,transparent 65%);mask:radial-gradient(circle,transparent 45%,black 52%,black 59%,transparent 65%);opacity:.5;will-change:transform}
.s-seams{inset:70px 92px 86px;border-radius:50%;transform:translateZ(23px);background:conic-gradient(from 16deg,transparent 0deg 18deg,rgba(144,157,170,.34) 18deg 20deg,transparent 20deg 78deg,rgba(144,157,170,.32) 78deg 80deg,transparent 80deg 148deg,rgba(144,157,170,.3) 148deg 150deg,transparent 150deg 218deg,rgba(144,157,170,.26) 218deg 220deg,transparent 220deg 288deg,rgba(144,157,170,.24) 288deg 290deg,transparent 290deg 360deg);-webkit-mask:radial-gradient(circle,transparent 50%,black 56%,black 65%,transparent 70%);mask:radial-gradient(circle,transparent 50%,black 56%,black 65%,transparent 70%);opacity:.18}
.s-apertures{inset:104px 128px 112px;border-radius:50%;transform:translateZ(30px) rotate(0deg);background:conic-gradient(from 10deg,transparent 0deg 22deg,rgba(57,223,200,.52) 22deg 30deg,transparent 30deg 98deg,rgba(255,194,92,.48) 98deg 106deg,transparent 106deg 178deg,rgba(57,223,200,.46) 178deg 186deg,transparent 186deg 254deg,rgba(255,194,92,.4) 254deg 262deg,transparent 262deg 360deg);-webkit-mask:radial-gradient(circle,transparent 34%,black 42%,black 53%,transparent 59%);mask:radial-gradient(circle,transparent 34%,black 42%,black 53%,transparent 59%);opacity:.86;will-change:transform,opacity}
.s-veins{inset:58px 74px 72px;border-radius:50%;transform:translateZ(28px);opacity:.56;background:radial-gradient(circle at 31% 47%,rgba(57,223,200,.24) 0 .9%,transparent 2.2%),radial-gradient(circle at 41% 37%,rgba(255,255,255,.2) 0 .8%,transparent 2%),radial-gradient(circle at 60% 36%,rgba(57,223,200,.2) 0 .9%,transparent 2.2%),linear-gradient(118deg,transparent 0 31%,rgba(57,223,200,.14) 32%,transparent 33%),linear-gradient(59deg,transparent 0 43%,rgba(255,255,255,.12) 44%,transparent 45%)}
.s-core{left:50%;top:50%;width:82px;height:82px;margin:-41px 0 0 -41px;border-radius:50%;transform:translateZ(34px);background:radial-gradient(circle at 45% 38%,rgba(255,255,255,.98) 0 11%,rgba(255,255,255,.24) 21%,transparent 33%),radial-gradient(circle,rgba(57,223,200,.94) 0,rgba(57,223,200,.3) 30%,rgba(255,194,92,.16) 54%,transparent 72%);box-shadow:0 0 28px rgba(57,223,200,.54),0 0 52px rgba(255,255,255,.3),0 0 68px rgba(255,194,92,.16);will-change:box-shadow,transform}
.s-shine{inset:34px 34px 56px;border-radius:50%;transform:translateZ(37px);background:radial-gradient(circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.88) 0 5%,rgba(255,255,255,.18) 14%,transparent 28%),linear-gradient(135deg,rgba(255,255,255,.3),rgba(255,255,255,0) 36%,rgba(255,255,255,.08) 58%,transparent 76%);mix-blend-mode:screen;opacity:.84}
.engage-svg{inset:0;transform:translateY(4px) translateZ(46px);filter:drop-shadow(0 0 8px rgba(255,255,255,.56)) drop-shadow(0 0 26px rgba(255,255,255,.4)) drop-shadow(0 1px 1px rgba(146,162,178,.48))}
.engage-text{font-family:Orbitron,Inter,sans-serif;font-size:19.5px;font-weight:800;letter-spacing:.34em;text-transform:uppercase;fill:rgba(245,250,254,.96)}
.underside-veil{position:absolute;left:50%;top:50%;width:320px;height:164px;margin:54px 0 0 -160px;border-radius:50%;transform:translateZ(28px) translateY(0);mix-blend-mode:screen;opacity:0;pointer-events:none;will-change:opacity,transform;background:radial-gradient(circle at 50% 48%,rgba(57,223,200,.98) 0 4%,rgba(57,223,200,.64) 10%,rgba(57,223,200,.22) 24%,rgba(57,223,200,.05) 42%,transparent 58%),conic-gradient(from 0deg,transparent 0deg 14deg,rgba(255,220,140,.88) 18deg 28deg,transparent 32deg 74deg,rgba(57,223,200,.94) 78deg 90deg,transparent 94deg 134deg,rgba(255,220,140,.84) 138deg 148deg,transparent 152deg 194deg,rgba(255,255,255,.72) 198deg 206deg,transparent 210deg 254deg,rgba(57,223,200,.9) 258deg 270deg,transparent 274deg 314deg,rgba(255,220,140,.82) 318deg 328deg,transparent 332deg 360deg),radial-gradient(circle at 50% 48%,transparent 34%,rgba(57,223,200,.3) 38%,rgba(57,223,200,.08) 46%,transparent 54%)}
.underside-veil::before{content:"";position:absolute;inset:18px;border-radius:50%;background:conic-gradient(from 22deg,transparent 0deg 28deg,rgba(57,223,200,.96) 32deg 40deg,transparent 44deg 118deg,rgba(255,220,140,.9) 122deg 130deg,transparent 134deg 208deg,rgba(57,223,200,.92) 212deg 220deg,transparent 224deg 298deg,rgba(255,255,255,.78) 302deg 310deg,transparent 314deg 360deg);-webkit-mask:radial-gradient(circle,transparent 32%,black 38%,black 52%,transparent 57%);mask:radial-gradient(circle,transparent 32%,black 38%,black 52%,transparent 57%);mix-blend-mode:screen}
.caption{position:absolute;left:50%;bottom:-18px;transform:translateX(-50%);white-space:nowrap;z-index:8;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(75,92,108,.72);padding:10px 20px;border-radius:999px;background:rgba(255,255,255,.3);box-shadow:12px 12px 26px rgba(166,180,196,.26),-10px -10px 20px rgba(255,255,255,.86);backdrop-filter:blur(6px)}
@keyframes ringA{to{transform:translateZ(22px) rotate(360deg)}} @keyframes ringB{to{transform:translateZ(26px) rotate(-540deg)}}
@keyframes aptPulse{0%,100%{opacity:.86;transform:translateZ(30px) rotate(0deg) scale(1)}50%{opacity:1;transform:translateZ(30px) rotate(180deg) scale(1.04)}}
@keyframes aptCharge{0%{transform:translateZ(30px) rotate(0deg);opacity:.9}100%{transform:translateZ(30px) rotate(360deg);opacity:1}}
@keyframes corePulse{0%,100%{box-shadow:0 0 28px rgba(57,223,200,.54),0 0 52px rgba(255,255,255,.3),0 0 68px rgba(255,194,92,.16)}50%{box-shadow:0 0 44px rgba(57,223,200,.82),0 0 72px rgba(255,255,255,.5),0 0 96px rgba(255,194,92,.28)}}
@keyframes undersideSpin{to{transform:translateZ(28px) rotate(360deg)}}
.scene[data-state="hover"] .s-ring-a{animation:ringA 6s linear infinite}.scene[data-state="hover"] .s-ring-b{animation:ringB 9s linear infinite}.scene[data-state="hover"] .s-apertures{animation:aptPulse 3.4s ease-in-out infinite}.scene[data-state="hover"] .s-core{animation:corePulse 2.8s ease-in-out infinite}
.scene[data-state="charge"] .s-ring-a{animation:ringA 2.2s linear infinite}.scene[data-state="charge"] .s-ring-b{animation:ringB 3.1s linear infinite}.scene[data-state="charge"] .s-apertures{animation:aptCharge 1.8s linear infinite}.scene[data-state="charge"] .s-core{animation:corePulse 1.1s ease-in-out infinite}.scene[data-state="charge"] .underside-veil{animation:undersideSpin 4s linear infinite}
</style>
</head>
<body>
<main class="stage">
  <section class="panel" aria-label="Repulsine launch control panel — pass 2K">
    <div class="panel-tag">Vril Interface · 2K · static inner bubble removed · outer field preserved</div>
    <div class="scene" id="scene" data-state="idle">
      <div class="underlay" aria-hidden="true">
        <div class="aura"></div>
        <div class="well"></div>
        <div class="field-shell" id="fieldShell"></div>
        <div class="force-ring" id="forceRing"></div>
        <div class="shadow-umbra" id="shadowUmbra"></div>
      </div>
      <div class="tilt-stage">
        <div class="tilt-body" id="tiltBody">
          <button class="saucer" id="saucer" aria-label="Engage Repulsine launch sequence">
            <div class="s-main"></div><div class="s-belly"></div><div class="s-rim"></div>
            <div class="s-ring-a"></div><div class="s-ring-b"></div><div class="s-seams"></div>
            <div class="s-apertures"></div><div class="s-veins"></div><div class="s-core"></div><div class="s-shine" id="sShine"></div>
            <svg class="engage-svg" viewBox="0 0 430 252" aria-hidden="true"><defs><radialGradient id="eg2k" cx="50%" cy="50%" r="62%"><stop offset="0%" stop-color="#ffffff"/><stop offset="28%" stop-color="#fafcff"/><stop offset="68%" stop-color="#e0eaf2"/><stop offset="100%" stop-color="#c6d2dc"/></radialGradient><path id="ea2k" d="M 112 164 A 103 27 0 0 0 318 164"/></defs><text class="engage-text" fill="url(#eg2k)"><textPath href="#ea2k" startOffset="50%" text-anchor="middle">ENGAGE</textPath></text></svg>
          </button>
          <div class="underside-veil" id="sUnderside"></div>
        </div>
      </div>
      <div class="caption" id="caption">Hover · tilt toward top edge to reveal propulsion · click to charge</div>
    </div>
    <div class="panel-note">Coanda Hull · Thule Triebwerk · pass 2K</div>
  </section>
</main>
<script>
(() => {
  const scene = document.getElementById('scene');
  const tiltBody = document.getElementById('tiltBody');
  const saucer = document.getElementById('saucer');
  const sShine = document.getElementById('sShine');
  const sUnderside = document.getElementById('sUnderside');
  const fieldShell = document.getElementById('fieldShell');
  const forceRing = document.getElementById('forceRing');
  const shadowUmbra = document.getElementById('shadowUmbra');
  const caption = document.getElementById('caption');
  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
  let charging = false, chargeLevel = 0, rafId = null, lastRotX = 0, lastRotY = 0;

  function setUnderside(){
    const backFactor = clamp(-lastRotX / 18, 0, 1);
    const chargeFactor = chargeLevel * 0.52;
    const u = Math.max(backFactor, chargeFactor);
    sUnderside.style.opacity = u.toFixed(3);
    sUnderside.style.transform = `translateZ(28px) translateY(${(-backFactor * 18).toFixed(1)}px) scale(${(0.9 + u * 0.12).toFixed(3)})`;
  }

  function applyTilt(e){
    const r = scene.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const nx = clamp((e.clientX - cx) / (r.width / 2), -1, 1);
    const ny = clamp((e.clientY - cy) / (r.height / 2), -1, 1);
    lastRotY = nx * 18;
    lastRotX = ny * 20;
    tiltBody.style.transform = `rotateX(${lastRotX.toFixed(2)}deg) rotateY(${lastRotY.toFixed(2)}deg)`;
    const sr = saucer.getBoundingClientRect();
    const mx = ((e.clientX - sr.left) / sr.width) * 100;
    const my = ((e.clientY - sr.top) / sr.height) * 100;
    sShine.style.setProperty('--mx', `${clamp(mx,0,100).toFixed(1)}%`);
    sShine.style.setProperty('--my', `${clamp(my,0,100).toFixed(1)}%`);
    setUnderside();
  }

  function resetTilt(){
    lastRotX = 0; lastRotY = 0;
    tiltBody.style.transform = 'rotateX(0deg) rotateY(0deg)';
    sShine.style.setProperty('--mx','50%');
    sShine.style.setProperty('--my','50%');
    setUnderside();
  }

  function tickCharge(){
    chargeLevel = charging ? Math.min(chargeLevel + 0.011, 1) : Math.max(chargeLevel - 0.014, 0);
    const c = chargeLevel;

    const shellOpacity = c < 0.08 ? 0 : (c - 0.08) / 0.92 * 0.98;
    const shellScale = c < 0.08 ? 0.01 : 0.18 + c * 2.72;
    const shellY = -8 - c * 50;
    fieldShell.style.opacity = shellOpacity.toFixed(3);
    fieldShell.style.transform = `translate(-50%,-50%) scale(${shellScale.toFixed(3)}) translateY(${shellY.toFixed(1)}px)`;

    forceRing.style.opacity = (c < 0.10 ? 0 : 0.75 + (c - 0.10) / 0.90 * 0.25).toFixed(3);
    forceRing.style.transform = `translate(-50%,-50%) translateY(${(14 + c * 30).toFixed(1)}px) scale(${(0.92 + c * 0.40).toFixed(3)})`;

    const liftPx = c < 0.45 ? -(c / 0.45) * 22 : -22 - ((c - 0.45) / 0.55) * 77;
    saucer.style.transform = `translateY(${liftPx.toFixed(2)}px)`;
    shadowUmbra.style.transform = `translate(-50%,-50%) translateY(${(162 + c * 112).toFixed(1)}px) scale(${(1 + c * 0.55).toFixed(3)})`;
    shadowUmbra.style.filter = `blur(${(12 + c * 22).toFixed(1)}px)`;
    shadowUmbra.style.opacity = (0.3 - c * 0.18).toFixed(3);

    setUnderside();

    if (c > 0.985) caption.textContent = 'Thule Triebwerk engaged — field threshold breached';
    else if (charging) caption.textContent = `Charging Vril capacitors… ${Math.round(c*100)}%`;
    else if (c < 0.02) caption.textContent = 'Hover · tilt toward top edge to reveal propulsion · click to charge';
    else caption.textContent = `Discharge… ${Math.round(c*100)}%`;

    if (charging || c > 0.005) rafId = requestAnimationFrame(tickCharge);
    else { rafId = null; resetTilt(); }
  }

  scene.addEventListener('pointerenter', () => { if (!charging && chargeLevel < 0.02) scene.dataset.state = 'hover'; });
  scene.addEventListener('pointermove', applyTilt);
  scene.addEventListener('pointerleave', () => { resetTilt(); if (!charging && chargeLevel < 0.02) scene.dataset.state = 'idle'; });
  scene.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    charging = !charging;
    scene.dataset.state = charging ? 'charge' : 'hover';
    if (!rafId) rafId = requestAnimationFrame(tickCharge);
  });
  resetTilt();
})();
</script>
</body>
</html>
